function normalizeDigits(s){const z='０１２３４５６７８９',k={'一':'1','二':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9','〇':'0','零':'0'};return String(s||'').replace(/[０-９]/g,ch=>z.indexOf(ch)).replace(/[一二三四五六七八九〇零]/g,ch=>k[ch])}function parseClassText(text){let s=normalizeDigits(text).replace(/\s/g,'');let m=s.match(/([1-9])年?([1-9])組?/);if(m)return{grade:m[1],classNo:m[2]};m=s.match(/([1-9])[-ー−の]([1-9])/);if(m)return{grade:m[1],classNo:m[2]};return null}function makeClassName(g,k){return `${g}年${k}組`}function schoolById(id){return db.schools.find(s=>s.id===id)}function cls(id){return db.classes.find(c=>c.id===id)}function nextSchoolCode(){const used=new Set(db.schools.map(s=>String(s.code)));for(let i=1;i<=9;i++)if(!used.has(String(i)))return String(i);return String(db.schools.length+1).slice(-1)}function normalizeSchool(s){if(!s.id)s.id='s_'+uid();if(!s.code)s.code=nextSchoolCode();s.code=String(s.code).replace(/\D/g,'').slice(0,1)||nextSchoolCode();s.name=s.name||`学校${s.code}`;return s}function normalizeClass(c){if(!c.id)c.id='c_'+uid();if(!c.schoolId&&db.schools[0])c.schoolId=db.schools[0].id;if(!('year'in c))c.year=thisYear();if(!('grade'in c))c.grade='1';if(!('classNo'in c))c.classNo='1';c.name=makeClassName(c.grade,c.classNo);c.students=c.students||[];return c}function makeStudentId(c,num){const s=schoolById(c.schoolId);return `${c.year}${s?.code||'0'}${c.grade}${c.classNo}${pad2(num)}`}function displayTab(c){const s=schoolById(c.schoolId);return `${c.year} / ${s?.name||'学校'} / ${c.name}`}function classSortKey(c){const s=schoolById(c.schoolId);return `${c.year}-${String(s?.code||'0')}-${String(c.grade||'0')}-${String(c.classNo||'0')}`}function sortClassesInPlace(){db.classes.sort((a,b)=>classSortKey(a).localeCompare(classSortKey(b),'ja'))}function sortedClasses(list){return [...list].sort((a,b)=>classSortKey(a).localeCompare(classSortKey(b),'ja'))}
function save(){db.schools=db.schools.map(normalizeSchool);db.classes=db.classes.map(normalizeClass);db.attendance=db.attendance||[];db.forgetItems=(db.forgetItems&&db.forgetItems.length)?db.forgetItems:['教科書','ノート','ワーク','プリント','筆記用具','提出物','タブレット','その他'];sortClassesInPlace();db.lastSaved=now();localStorage.setItem(KEY,JSON.stringify(db));render()}function softSave(){sortClassesInPlace();db.lastSaved=now();localStorage.setItem(KEY,JSON.stringify(db))}function load(){try{const r=localStorage.getItem(KEY);if(r)db=JSON.parse(r);db.schools=(db.schools||[]).map(normalizeSchool);db.classes=(db.classes||[]).map(normalizeClass);db.attendance=db.attendance||[];db.forgetItems=(db.forgetItems&&db.forgetItems.length)?db.forgetItems:['教科書','ノート','ワーク','プリント','筆記用具','提出物','タブレット','その他'];sortClassesInPlace()}catch(e){}}
function csvMake(rows,heads){const e=v=>'"'+String(v??'').replaceAll('"','""')+'"';return '\uFEFF'+[heads.join(','),...rows.map(r=>heads.map(h=>e(r[h])).join(','))].join('\n')}function dl(name,text,type='text/plain'){const b=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)}

function settingsPage(){const ss=schoolById(db.selectedSchoolId);const selectedClasses=sortedClasses(db.classes.filter(c=>c.schoolId===db.selectedSchoolId));const sc=cls(db.selectedClassId);return `<section class="page ${db.activeTab==='settings'?'active':''}"><div class="grid4"><div class="card"><h2>学校</h2><div class="two"><label>学校名<input id="newSchoolName" placeholder="例：三中"></label><button id="addSchoolBtn" class="fit">追加</button></div><div class="list" style="margin-top:12px">${db.schools.length?db.schools.map(s=>`<div class="item ${db.selectedSchoolId===s.id?'active':''}" data-select-school="${s.id}"><div><b>${esc(s.name)}</b><span>コード <input data-school-code="${s.id}" value="${s.code}" maxlength="1" inputmode="numeric" style="width:38px;padding:2px 4px;font-size:12px"></span></div><button class="danger small" data-del-school="${s.id}">削除</button></div>`).join(''):'<div class="empty">学校を追加</div>'}</div></div><div class="card"><h2>クラス</h2>${ss?`<div class="path">${esc(ss.name)} / コード ${ss.code}</div><div class="two"><label>クラス名<input id="newClassText" placeholder="例：3年2組 / 3-2"></label><button id="addClassBtn" class="fit">追加</button></div><label class="hint">年度<input id="newClassYear" inputmode="numeric" value="${thisYear()}" style="margin-top:4px"></label><div class="list" style="margin-top:12px">${selectedClasses.length?selectedClasses.map(c=>`<div class="item ${db.selectedClassId===c.id?'active':''}" data-select-class="${c.id}"><div><b>${c.name}</b><span>${c.year} / ${c.students.length}人</span></div><button class="danger small" data-del-class="${c.id}">削除</button></div>`).join(''):'<div class="empty">この学校にクラスがありません</div>'}</div>`:'<div class="empty">先に学校を追加してください</div>'}</div><div class="card"><h2>生徒ID登録</h2>${sc?rosterEditor(sc):'<div class="empty">左で学校とクラスを選択してください</div>'}</div><div class="card"><h2>忘れ物項目</h2><div class="hint">1行に1つずつ入力。</div><textarea id="forgetItemsText">${esc(db.forgetItems.join('\n'))}</textarea><button id="saveForgetItems" style="marg function rosterEditor(c){const s=schoolById(c.schoolId);return `<div class="path">${c.year} / ${esc(s?.name||'学校')} / ${c.name}</div><div class="hint">名前欄に貼り付けできます。</div><div class="wrap"><table class="tbl"><thead><tr><th class="num">番号</th><th class="sid">ID</th><th class="name">名前</th><th class="qr">QR文字</th></tr></thead><tbody>${Array.from({length:40},(_,i)=>rosterRow(c,i+1)).join('')}</tbody></table></div><div class="row" style="margin-top:8px"><button id="saveRosterBtn">名簿を保存</button><button id="openClass" class="secondary">保存して開く</button><button id="exportSelected" class="secondary">CSV出力</button><button id="clearRoster" class="secondary">空にする</button></div>`}function rosterRow(c,num){const s=c.students.find(x=>x.number===num)||{};const id=makeStudentId(c,num);return `<tr><td class="num">${num}</td><td class="sid">${id}</td><td class="name"><input class="cell-input" data-name-num="${num}" value="${esc(s.name||'')}" placeholder="${num}番"></td><td class="qr">${id}</td></tr>`}
function classPage(c){const s=schoolById(c.schoolId);return `<section class="page ${db.activeTab===c.id?'active':''}"><div class="class-page"><main><div class="card"><div class="row" style="justify-content:space-between"><h2>${c.name}<span class="path" style="margin-left:8px">${c.year} ${esc(s?.name||'学校')}</span></h2><div class="row fit"><button class="secondary" data-export="${c.id}">CSV出力</button><button class="secondary" data-copy="${c.id}">ID一覧コピー</button></div></div><div class="hint">テプラ等でQR化する場合はCSVの qr_text を使います。</div></div><div class="wrap" style="height:calc(100vh - 120px);margin-top:6px"><table class="tbl"><thead><tr><th class="num">番号</th><th class="sid">ID</th><th class="name">名前</th><th class="qr">QR文字</th></tr></thead><tbody>${Array.from({length:40},(_,i)=>rosterRow(c,i+1)).join('')}</tbody></table></div></main><aside class="card"><h2>IDルール</h2><div class="preview"><div><span class="hint">年度</span><b>${c.year}</b></div><div><span class="hint">学校コード</span><b>${esc(s?.code||'0')}</b></div><div><span class="hint">学年・組</span><b>${c.grade}年${c.classNo}組</b></div><div><span class="hint">5番のID例</span><div class="big-id">${makeStudentId(c,5)}</div></div><div><span class="hint">登録済み</span><b>${c.students.length}人</b></div></div></aside></div></section>`}
function receptionPage(){const date=localStorage.getItem('lessonDate')||today();const period=localStorage.getItem('lessonPeriod')||'1時間目';const selectedClass=localStorage.getItem('lessonClassId')||(db.classes[0]?.id||'');const recent=[...db.attendance].filter(r=>r.date===date&&r.period===period&&r.classId===selectedClass).sort((a,b)=>String(b.time).localeCompare(String(a.time))).slice(0,80);return `<section class="page ${db.activeTab==='reception'?'active':''}"><div class="reception-setup"><main><div class="card"><h2>受付設定</h2><div class="row"><label class="fit" style="min-width:180px">日付<input id="lessonDate" type="date" value="${date}"></label><label class="fit" style="min-width:260px">クラス<select id="lessonClass">${sortedClasses(db.classes).map(c=>`<option value="${c.id}" ${c.id===selectedClass?'selected':''}>${esc(displayTab(c))}</option>`).join('')}</select></label></div><div style="margin-top:10px"><div class="hint">時間目</div><div class="period-grid">${['1時間目','2時間目','3時間目','4時間目','5時間目','6時間目','放課後'].map(x=>`<button class="period-btn ${x===period?'active':''}" data-period="${x}">${x}</button>`).join('')}</div></div><div class="row" style="margin-top:14px"><button id="startReception" class="green start-btn" style="flex:1">受付開始</button><button id="fullscreenReception" class="secondary start-btn" style="min-width:180px">全画面</button></div><div class="hint" style="margin-top:6px">iPadでは受付開始後に全画面が解除される場合があります。その場合はホーム画面追加での起動がおすすめです。</div></div><div class="wrap" style="margin-top:8px;height:calc(100vh - 330px)"><table class="tbl"><thead><tr><th style="width:140px">日時</th><th style="width:100px">授業</th><th style="width:180px">ID</th><th style="width:160px">名前</th><th style="width:220px">クラス</th><th style="width:260px">忘れ物</th></tr></thead><tbody>${recent.length?recent.map(r=>`<tr><td style="padding:7px 8px">${esc(r.time)}</td><td style="padding:7px 8px">${esc(r.period)}</td><td style="padding:7px 8px"><b>${esc(r.studentId)}</b></td><td style="padding:7px 8px">${esc(r.n function dateObj(iso){const [y,m,d]=String(iso).split('-').map(Number);return new Date(y,m-1,d)}
function isoDate(d){const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`}
function addDaysISO(iso,n){const d=dateObj(iso);d.setDate(d.getDate()+n);return isoDate(d)}
function weekStartMonday(iso=today()){const d=dateObj(iso);const day=d.getDay();d.setDate(d.getDate()-((day+6)%7));return isoDate(d)}
function currentWeekStart(){return localStorage.getItem('attendanceWeekStart')||weekStartMonday(today())}
function setWeekStart(iso){localStorage.setItem('attendanceWeekStart',weekStartMonday(iso||today()))}
function jpWeekLabel(start){return `${start.replaceAll('-','/')} 〜 ${addDaysISO(start,5).replaceAll('-','/')}`}
function mdLabel(iso){const d=dateObj(iso);return `${d.getMonth()+1}/${d.getDate()}`}
function periodList(){return ['1時間目','2時間目','3時間目','4時間目','5時間目','6時間目']}
function dayLabels(){return ['月','火','水','木','金','土']}
function recordsForSlot(date,period){return db.attendance.filter(r=>r.date===date&&r.period===period)}
function slotGroups(date,period){const map=new Map();recordsForSlot(date,period).forEach(r=>{const c=cls(r.classId);const s=c?schoolById(c.schoolId):null;const key=r.classId||`${r.school}-${r.className}`;if(!map.has(key))map.set(key,{classId:r.classId||'',className:r.className||c?.name||'クラス',school:r.school||s?.name||'',records:[]});map.get(key).records.push(r)});return [...map.values()].sort((a,b)=>`${a.school}${a.className}`.localeCompare(`${b.school}${b.className}`,'ja'))}
function copyTextToClipboard(text,label='コピー'){const value=String(text||'');if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(value).then(()=>toast(label+'しました')).catch(()=>fallbackCopyText(value,label))}else fallbackCopyText(value,label)}
function fallbackCopyText(text,label='コピー'){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');toast(label+'しました')}catch(e){toast('コピーできませんでした')}ta.remove()}
function attendanceCheckPage(){const start=currentWeekStart();const days=dayLabels().map((label,i)=>({label,date:addDaysISO(start,i)}));const periods=periodList();let total=0,forgot=0;db.attendance.forEach(r=>{if(r.date>=start&&r.date<=addDaysISO(start,5)){total++;if((r.items||[]).length)forgot++}});const activeSlots=periods.reduce((n,p)=>n+days.filter(d=>slotGroups(d.date,p).length).length,0);return `<section class="page ${db.activeTab==='attendanceCheck'?'active':''}"><div class="attendance-check"><div class="card attendance-head compact"><div><h2>出席確認</h2><div class="path">${jpWeekLabel(start)} / 月曜〜土曜 / 1〜6時間目</div></div><div class="row fit"><button id="prevWeek" class="secondary">前の週</button><button id="thisWeek" class="secondary">今週</button><button id="nextWeek" class="secondary">次の週</button><label class="fit week-picker">週の日付<input id="weekPick" type="date" value="${start}"></label></div></div><div class="attendance-summary compact"><div class="scan-stat"><span class="hint">受付</span><b>${total}</b></div><div class="scan-stat"><span class="hint">忘れ物</span><b>${forgot}</b></div><div class="scan-stat"><span class="hint">枠</span><b>${activeSlots}</b></div></div><div class="week-wrap no-scroll"><table class="week-table fit-table"><thead><tr><th class="period-head">時間</th>${days.map(d=>`<th><div>${d.label}</div><span>${mdLabel(d.date)}</span></th>`).join('')}</tr></thead><tbody>${periods.map(p=>`<tr><th class="period-head">${p.replace('時間目','')}</th>${days.map(d=>{const groups=slotGroups(d.date,p);return `<td>${groups.length?groups.map(g=>{const f=g.records.filter(r=>(r.items||[]).length).length;return `<button class="session-chip mini" data-att-date="${d.date}" data-att-period="${p}" data-att-class="${esc(g.classId)}"><b>${esc(g.className)}</b><span>${g.records.length}人${f?`/忘${f}`:''}</span></button>`}).join(''):'<div class="week-empty">—</div>'}</td>`}).join('')}</tr>`).join('')}</tbody></table></div><div class="hint">各マスのクラスを押すと詳細を横並びで確認できます。</div></div></secti function makeAbsentText(absent,roster){if(!roster.length)return '欠席：名簿情報なし';return absent.length?'欠席：'+absent.map(st=>`${st.number}番 ${st.name}`).join('、'):'欠席：なし'}

function showAttendanceSlotDetail(date,period,classId){const group=slotGroups(date,period).filter(g=>String(g.classId)===String(classId))[0];if(!group){toast('この枠の受付記録はありません');return}const records=[...group.records].sort((a,b)=>String(a.studentId).localeCompare(String(b.studentId),'ja'));const c=cls(group.classId);const roster=c?.students||[];const presentIds=new Set(records.map(r=>r.studentId));const absent=roster.filter(st=>!presentIds.has(st.id)).sort((a,b)=>a.number-b.number);const forgetRecords=records.filter(r=>(r.items||[]).length);const presentHtml=records.length?records.map(r=>`<div class="student-chip detail-chip"><b>${esc(r.name)}</b><span>${esc(r.studentId)}</span></div>`).join(''):'<div class="empty">出席記録なし</div>';const absentHtml=absent.length?absent.map(st=>`<div class="student-chip detail-chip"><b>${st.number}番</b><span>${esc(st.name)}</span></div>`).join(''):(roster.length?'<div class="pill ok">欠席なし</div>':'<div class="hint">名簿情報なし</div>');const forgetHtml=forgetRecords.length?forgetRecords.map(r=>`<div class="student-chip detail-chip"><b>${esc(r.name)}</b><span>${esc((r.items||[]).join('、'))}</span></div>`).join(''):'<div class="pill ok">忘れ物なし</div>';const absentText=makeAbsentText(absent,roster);const forgetText=makeForgetText(records);const summaryText=`${date} ${period} ${group.school||''} ${group.className||''}\n${absentText}\n${forgetText}`;const mb=$('modalBack'),m=$('modal');m.innerHTML=`<h2>${date} ${period}</h2><div class="path">${esc(group.school||'学校')} / ${esc(group.className||'クラス')}</div><div class="slot-copy-actions"><button id="copyAbsent" class="secondary">欠席コピー</button><button id="copyForget" class="secondary">忘れ物コピー</button><button id="copySummary">まとめコピー</button></div><div class="scan-stats" style="margin:12px 0"><div class="scan-stat"><span class="hint">出席</span><b>${records.length}</b></div><div class="scan-stat"><span class="hint">欠席</span><b>${absent.length}</b></div><div class="scan-stat"><span class="hint">忘れ物</span><b>${forgetRecords.length}</b></div></div><div class="detail-columns"><section class="detail-panel"><h2>出席者</h2><div class="unscanned detail-list">${presentHtml}</div></section><section class="detail-panel"><h2>欠席者</h2><div class="unscanned detail-list">${absentHtml}</div></section><section class="detail-panel"><h2>忘れ物</h2><div class="unscanned detail-list">${forgetHtml}</div></section></div><div class="modal-actions" style="grid-template-columns:1fr;margin-top:16px"><button id="closeDetail">閉じる</button></div>`;mb.style.display='flex';$('copyAbsent').onclick=()=>copyTextToClipboard(absentText,'欠席をコピー');$('copyForget').onclick=()=>copyTextToClipboard(forgetText,'忘れ物をコピー');$('copySummary').onclick=()=>copyTextToClipboard(summaryText,'まとめをコピー');$('closeDetail').onclick=()=>{mb.style.display='none'}}
function collectRoster(c){const list=[];for(let i=1;i<=40;i++){const name=(document.querySelector(`[data-name-num="${i}"]`)?.value||'').trim();if(name)list.push({number:i,id:makeStudentId(c,i),name,qr_text:makeStudentId(c,i)})}c.students=list}function saveRoster(c,rerender=true){collectRoster(c);rerender?save():softSave();toast('名簿を保存しました')}function handleRosterPaste(e){const input=e.target;if(!input.matches('[data-name-num]'))return;const text=(e.clipboardData||window.clipboardData).getData('text');if(!text.includes('\n')&&!text.includes('\t'))return;e.preventDefault();const start=Number(input.dataset.nameNum);const vals=text.replace(/\r/g,'').split('\n').map(line=>line.split('\t')[0].trim()).filter((v,i,a)=>!(i===a.length-1&&v===''));vals.forEach((v,i)=>{const t=document.querySelector(`[data-name-num="${start+i}"]`);if(t)t.value=v})}
function classRows(c){return Array.from({length:40},(_,i)=>{const num=i+1;const st=c.students.find(x=>x.number===num)||{};const id=makeStudentId(c,num);return {year:c.year,school:schoolById(c.schoolId)?.name||'',class_name:c.name,number:num,id,name:st.name||'',qr_text:id}})}function exportClass(c){dl(`${displayTab(c)}_生徒ID.csv`,csvMake(classRows(c),['year','school','class_name','number','id','name','qr_text']),'text/csv')}function copyIds(c){const text=classRows(c).filter(r=>r.name).map(r=>r.id).join('\n');navigator.clipboard?.writeText(text).then(()=>toast('ID一覧をコピーしました')).catch(()=>toast('コピーできませんでした'))}function attendanceRows(){return db.attendance.map(r=>({date:r.date,period:r.period,time:r.time,student_id:r.studentId,name:r.name,school:r.school,class_name:r.className,forgotten_items:(r.items||[]).join('、'),rescan_count:r.rescanCount||0}))}function exportAttendance(){dl(`受付記録_${today()}.csv`,csvMake(attendanceRows(),['date','period','time','student_id','name','school','class_name','forgotten_items','rescan_count']),'text/csv')}
function findStudentInClass(id,classId){const c=cls(classId);if(!c)return null;const st=(c.students||[]).find(s=>s.id===id);if(st)return{student:st,klass:c,school:schoolById(c.schoolId)};return null}function sessionPresentIds(){if(!currentSession)return new Set();return new Set(db.attendance.filter(r=>r.date===currentSession.date&&r.period===currentSession.period&&r.classId===currentSession.classId).map(r=>r.studentId))}function unscannedStudents(){const c=cls(currentSession?.classId);if(!c)return[];const done=sessionPresentIds();return (c.students||[]).filter(s=>!done.has(s.id)).sort((a,b)=>a.number-b.number)}
function showFinalReport(onClose){if(!currentSession)return;const c=cls(currentSession.classId);if(!c)return;const s=schoolById(c.schoolId);const records=db.attendance.filter(r=>r.date===currentSession.date&&r.period===currentSession.period&&r.classId===currentSession.classId);const presentIds=new Set(records.map(r=>r.studentId));const absent=(c.students||[]).filter(st=>!presentIds.has(st.id)).sort((a,b)=>a.number-b.number);const forgetRecords=records.filter(r=>(r.items||[]).length>0);const noForgetCount=records.length-forgetRecords.length;const rate=records.length?Math.round(noForgetCount/records.length*100):0;const absentHtml=absent.length?absent.map(st=>`<div class="student-chip"><b>${st.number}番</b><span>${esc(st.name)}</span></div>`).join(''):'<div class="pill ok">未出席はいません</div>';const forgetHtml=forgetRecords.length?forgetRecords.map(r=>`<div class="student-chip"><b>${esc(r.name)}</b><span>${esc((r.items||[]).join('、'))}</span></div>`).join(''):'<div class="pill ok">忘れ物はありません</div>';const mb=$('modalBack'),m=$('modal');m.innerHTML=`<h2>受付終了レポート</h2><div class="path">${esc(s?.name||'学校')} / ${c.year} / ${c.name} / ${currentSession.date} / ${currentSession.period}</div><div class="scan-stats" style="margin:14px 0"><div class="scan-stat"><span class="hint">登録人数</span><b>${c.students.length}</b></div><div class="scan-stat"><span class="hint">出席</span><b>${records.length}</b></div><div class="scan-stat"><span class="hint">未出席</span><b>${absent.length}</b></div></div><div class="scan-stats" style="margin:0 0 14px"><div class="scan-stat"><span class="hint">忘れ物なし</span><b>${noForgetCount}</b></div><div class="scan-stat"><span class="hint">忘れ物あり</span><b>${forgetRecords.length}</b></div><div class="scan-stat"><span class="hint">忘れ物なし率</span><b>${rate}%</b></div></div><h2>未出席</h2><div class="unscanned" style="max-height:190px;margin-bottom:14px">${absentHtml}</div><h2>忘れ物</h2><div class="unscanned" style="max-height:190px">${forgetHtml}</div><div class="modal-actions" style="grid-template-columns:1fr;margin-top:16px"><button id="closeReport">閉じる</button></div>`;mb.style.display='flex';$('closeReport').onclick=()=>{mb.style.display='none';qrScanBusy=false;if(typeof onClose==='function')onClose()}}
function renderScanFull(){const c=cls(currentSession.classId),s=schoolById(c.schoolId);const un=unscannedStudents();const done=(c.students||[]).length-un.length;$('scanFull').innerHTML=`<div class="scan-layout"><main class="scan-main"><h1 class="scan-title-pulse">QRコードをスキャンしてください</h1><div class="lesson">${esc(s?.name||'学校')} / ${c.year} / ${c.name} / ${currentSession.date} / ${currentSession.period}</div><input id="fullScanInput" class="scan-input" placeholder="バーコードリーダー入力 / 手入力"><div class="row camera-actions"><button id="startCamera" class="secondary">インカメラ開始</button><button id="switchCamera" class="secondary">${qrCameraFacing==='user'?'外カメラへ':'インカメラへ'}</button><button id="stopCamera" class="danger">カメラ停止</button></div><div id="cameraReader" class="camera-reader"></div><div class="camera-note">iPadでは入力欄フォーカスで全画面が解除されやすいため、カメラ運用時はインカメラ開始を使ってください。</div><div class="hint" style="color:#cbd5e1;margin-top:10px">外付けリーダーもそのまま使えます</div></main><aside class="scan-side"><div class="scan-card"><h2>受付状況</h2><div class="scan-stats"><div class="scan-stat"><span class="hint">全員</span><b>${c.students.length}</b></div><div class="scan-stat"><span class="hint">出席</span><b>${done}</b></div><div class="scan-stat"><span class="hint">未出席</span><b>${un.length}</b></div></div></div><div class="scan-card"><h2>未出席</h2><div class="unscanned">${un.length?un.map(st=>`<div class="student-chip"><b>${st.number}番</b><span>${esc(st.name)}</span></div>`).join(''):'<div class="empty">全員受付済み</div>'}</div></div><button id="exitScan" class="danger exit-btn">受付終了</button></aside></div>`;safeFocusInput();$('fullScanInput').onkeydown=e=>{if(e.key==='Enter')scanFullId()};$('startCamera').onclick=()=>{qrCameraAutoRestart=true;startCameraScanner()};$('stopCamera').onclick=()=>{qrCameraAutoRestart=false;stopCameraScanner(false)};$('switchCamera').onclick=()=>{qrCameraFacing=qrCameraFacing==='user'?'environment':'user';qrCameraAutoRestart=true;stopCameraScanner(true).finally(()=>setTimeout(startCameraScanner,120))};$('exitScan').onclick=()=>{qrCameraAutoRestart=false;stopCameraScanner(false);showFinalReport(()=>{qrScanBusy=false;$('scanFull').style.display='none';currentSession=null;render()})}}
function startReception(){const classId=$('lessonClass')?.value;if(!classId){toast('クラスを選択してください');return}currentSession={date:$('lessonDate')?.value||today(),period:localStorage.getItem('lessonPeriod')||'1時間目',classId};localStorage.setItem('lessonDate',currentSession.date);localStorage.setItem('lessonClassId',classId);requestFullscreenIfPossible(false);$('scanFull').style.display='block';renderScanFull();setTimeout(safeFocusInput,120)}function isIOSLike(){return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1)}
function safeFocusInput(){const input=$('fullScanInput');if(!input)return;setTimeout(()=>{try{input.focus();input.select?.()}catch(e){}},70)}
function handleScannedStudentId(id,source='input'){id=String(id||'').trim();if(!id||!currentSession)return;if($('modalBack')?.style.display==='flex')return;const found=findStudentInClass(id,currentSession.classId);if(!found){toast('このクラスにないIDです：'+id);$('fullScanInput')?.select();return}beep();const input=$('fullScanInput');if(input)input.value='';qrScanBusy=true;showAttendanceModal(found)}
function scanFullId(){const input=$('fullScanInput');const id=(input?.value||'').trim();handleScannedStudentId(id,'input')}
function handleCameraDecoded(text){const t=String(text||'').trim();const at=Date.now();if(!t||qrScanBusy)return;if(t===lastQrText&&at-lastQrAt<1800)return;lastQrText=t;lastQrAt=at;stopCameraScanner(true).finally(()=>handleScannedStudentId(t,'camera'))}
function startCameraScanner(){if(!currentSession){toast('先に受付を開始してください');return}if(typeof Html5Qrcode==='undefined'){toast('カメラ読取ライブラリを読み込めませんでした');return}const reader=$('cameraReader');if(!reader){toast('カメラ表示欄が見つかりません');return}if(qrScanner){toast('カメラは起動中です');return}reader.innerHTML='';qrScanner=new Html5Qrcode('cameraReader');qrScanner.start({facingMode:qrCameraFacing},{fps:10,qrbox:{width:250,height:250},aspectRatio:1.333},decodedText=>handleCameraDecoded(decodedText),()=>{}).then(()=>toast((qrCameraFacing==='user'?'インカメラ':'外カメラ')+'を開始しました')).catch(err=>{qrScanner=null;toast('カメラを開始できませんでした。HTTPS/権限を確認してください')})}
function stopCameraScanner(keepAuto=false){return new Promise(resolve=>{const scanner=qrScanner;if(!keepAuto)qrCameraAutoRestart=false;if(!scanner){resolve();return}qrScanner=null;Promise.resolve(scanner.stop()).catch(()=>{}).then(()=>scanner.clear()).catch(()=>{}).finally(()=>resolve())})}

function showAttendanceModal(found){const {student,klass,school}=found;const date=currentSession?.date||today();const period=currentSession?.period||'1時間目';const mb=$('modalBack'),m=$('modal');m.innerHTML=`<h2>${esc(student.name)} <span class="path">${esc(student.id)}</span></h2><div class="path">${esc(school?.name||'学校')} / ${klass.year} / ${klass.name} / ${date} / ${period}</div><div class="hint">忘れ物があればタッチしてください。複数選べます。</div><div class="forget-grid">${db.forgetItems.map(x=>`<button class="forget-btn" data-item="${esc(x)}">${esc(x)}</button>`).join('')}</div><label>メモ・その他<input id="otherItem" placeholder="その他の忘れ物・メモ"></label><div class="modal-actions"><button class="secondary" id="cancelModal">キャンセル</button><button id="presentBtn">出席</button></div>`;mb.style.display='flex';m.querySelectorAll('[data-item]').forEach(b=>b.onclick=()=>b.classList.toggle('selected'));$('cancelModal').onclick=()=>{mb.style.display='none';qrScanBusy=false;setTimeout(()=>{if(qrCameraAutoRestart)startCameraScanner();else safeFocusInput()},90)};$('presentBtn').onclick=()=>{const items=[...m.querySelectorAll('.forget-btn.selected')].map(b=>b.dataset.item);const other=($('otherItem')?.value||'').trim();if(other)items.push(other);const old=db.attendance.find(r=>r.date===date&&r.period===period&&r.classId===klass.id&&r.studentId===student.id);let wasUpdate=false;if(old){old.items=items;old.time=now();old.rescanCount=(old.rescanCount||0)+1;old.updatedAt=now();wasUpdate=true}else{db.attendance.push({date,period,time:now(),classId:klass.id,studentId:student.id,name:student.name,school:school?.name||'',className:klass.name,year:klass.year,items,rescanCount:0})}softSave();mb.style.display='none';qrScanBusy=false;toast(wasUpdate?'再スキャン：記録を上書きしました':'出席を記録しました');renderScanFull();if(qrCameraAutoRestart)setTimeout(startCameraScanner,180)}}
function addSchool(){const name=($('newSchoolName')?.value||'').trim();if(!name){toast('学校名を入力してください');return}const id='s_'+uid();db.schools.push(normalizeSchool({id,name,code:nextSchoolCode()}));db.selectedSchoolId=id;db.selectedClassId=null;save();toast('学校を追加しました')}function addClass(){const school=schoolById(db.selectedSchoolId);if(!school){toast('先に学校を追加してください');return}const parsed=parseClassText($('newClassText')?.value||'');if(!parsed){toast('クラス名を読み取れません。例：3年2組');return}const year=String(($('newClassYear')?.value||thisYear())).replace(/\D/g,'').slice(0,4)||String(thisYear());const exists=db.classes.find(c=>c.schoolId===school.id&&String(c.year)===year&&c.grade===parsed.grade&&c.classNo===parsed.classNo);if(exists){toast('同じ年度・学校・クラスがすでにあります');db.selectedClassId=exists.id;render();return}const id='c_'+uid();db.classes.push(normalizeClass({id,schoolId:school.id,year,grade:parsed.grade,classNo:parsed.classNo,students:[]}));db.selectedClassId=id;save();toast('クラスを追加しました')}function updateSchoolCode(inp){const s=schoolById(inp.dataset.schoolCode);if(!s)return;const old=String(s.code);const v=inp.value.replace(/\D/g,'').slice(0,1);inp.value=v;if(!v){inp.value=old;toast('学校コードは1桁の数字です');return}const dup=db.schools.find(x=>x.id!==s.id&&String(x.code)===v);if(dup){inp.value=old;toast('同じ学校コードがあります');return}s.code=v;db.classes.filter(c=>c.schoolId===s.id).forEach(c=>{c.students=(c.students||[]).map(st=>({...st,id:makeStudentId(c,st.number),qr_text:makeStudentId(c,st.number)}))});save()}
function bindSettings(){$('addSchoolBtn')?.addEventListener('click',addSchool);$('newSchoolName')?.addEventListener('keydown',e=>{if(e.key==='Enter')addSchool()});$('addClassBtn')?.addEventListener('click',addClass);$('newClassText')?.addEventListener('keydown',e=>{if(e.key==='Enter')addClass()});$('saveForgetItems')?.addEventListener('click',()=>{db.forgetItems=($('forgetItemsText').value||'').split(/\n/).map(x=>x.trim()).filter(Boolean);save();toast('忘れ物項目を保存しました')});document.querySelectorAll('[data-school-code]').forEach(inp=>{inp.onclick=e=>e.stopPropagation();inp.onkeydown=e=>{if(e.key==='Enter')updateSchoolCode(inp)};inp.onblur=()=>updateSchoolCode(inp)});document.querySelectorAll('[data-select-school]').forEach(el=>el.onclick=e=>{if(e.target.dataset.delSchool||e.target.dataset.schoolCode)return;db.selectedSchoolId=el.dataset.selectSchool;const first=db.classes.find(c=>c.schoolId===db.selectedSchoolId);db.selectedClassId=first?.id||null;softSave();render()});document.querySelectorAll('[data-select-class]').forEach(el=>el.onclick=e=>{if(e.target.dataset.delClass)return;db.selectedClassId=el.dataset.selectClass;softSave();render()});document.querySelectorAll('[data-del-school]').forEach(b=>b.onclick=e=>{e.stopPropagation();if(confirm('この学校と、その学校のクラスを削除しますか？')){db.classes=db.classes.filter(c=>c.schoolId!==b.dataset.delSchool);db.schools=db.schools.filter(s=>s.id!==b.dataset.delSchool);db.selectedSchoolId=db.schools[0]?.id||null;db.selectedClassId=db.classes.find(c=>c.schoolId===db.selectedSchoolId)?.id||null;if(!['settings','reception','attendanceCheck'].includes(db.activeTab)&&!db.classes.find(c=>c.id===db.activeTab))db.activeTab='settings';save()}});document.querySelectorAll('[data-del-class]').forEach(b=>b.onclick=e=>{e.stopPropagation();if(confirm('このクラスを削除しますか？')){db.classes=db.classes.filter(c=>c.id!==b.dataset.delClass);if(db.selectedClassId===b.dataset.delClass)db.selectedClassId=db.classes.find(c=>c.schoolId===db.selectedSchoolId)?.id||null;if(db.activeTab===b.dataset.delClass)db.activeTab='settings';save()}});const c=cls(db.selectedClassId);if(!c)return;document.querySelectorAll('[data-name-num]').forEach(i=>{i.addEventListener('paste',handleRosterPaste);i.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();collectRoster(c);softSave();const n=Number(i.dataset.nameNum);const next=document.querySelector(`[data-name-num="${n+1}"]`);if(next){next.focus();next.select()}else toast('名簿を保存しました')}})});$('saveRosterBtn')?.addEventListener('click',()=>saveRoster(c,true));$('clearRoster')?.addEventListener('click',()=>{document.querySelectorAll('[data-name-num]').forEach(i=>i.value='')});$('openClass')?.addEventListener('click',()=>{collectRoster(c);db.activeTab=c.id;save()});$('exportSelected')?.addEventListener('click',()=>{collectRoster(c);exportClass(c)})}
function bindClass(c){document.querySelectorAll(`[data-export="${c.id}"]`).forEach(b=>b.onclick=()=>exportClass(c));document.querySelectorAll(`[data-copy="${c.id}"]`).forEach(b=>b.onclick=()=>copyIds(c));document.querySelectorAll('[data-name-num]').forEach(i=>{i.addEventListener('paste',handleRosterPaste);i.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();collectRoster(c);softSave();const n=Number(i.dataset.nameNum);const next=document.querySelector(`[data-name-num="${n+1}"]`);if(next){next.focus();next.select()}else toast('名簿を保存しました')}})})}function bindReception(){document.querySelectorAll('[data-period]').forEach(b=>b.onclick=()=>{localStorage.setItem('lessonPeriod',b.dataset.period);render()});$('lessonDate')?.addEventListener('change',e=>{localStorage.setItem('lessonDate',e.target.value);render()});$('lessonClass')?.addEventListener('change',e=>{localStorage.setItem('lessonClassId',e.target.value);render()});$('startReception')?.addEventListener('click',startReception);$('fullscreenReception')?.addEventListener('click',toggleFullscreen);$('exportAttendance2')?.addEventListener('click',exportAttendance)}
function isFullscreen(){return !!(document.fullscreenElement||document.webkitFullscreenElement)}
function requestFullscreenIfPossible(showToast=true){const el=document.documentElement;try{if(isFullscreen())return;if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();if(showToast)toast('全画面に切り替えます')}catch(e){if(showToast)toast('全画面にできませんでした')}}
function exitFullscreenIfPossible(){try{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen()}catch(e){}}
function toggleFullscreen(){if(isFullscreen()){exitFullscreenIfPossible();toast('全画面を解除します')}else requestFullscreenIfPossible(true)}
$('backup').onclick=()=>dl('生徒ID受付管理_バックアップ_'+today()+'.json',JSON.stringify(db,null,2),'application/json');$('exportAttendance').onclick=exportAttendance;$('fullscreenBtn').onclick=toggleFullscreen;$('restore').onchange=async e=>{try{db=JSON.parse(await e.target.files[0].text());db.schools=(db.schools||[]).map(normalizeSchool);db.classes=(db.classes||[]).map(normalizeClass);db.attendance=db.attendance||[];db.forgetItems=db.forgetItems||['教科書','ノート','ワーク','プリント','筆記用具','提出物','タブレット','その他'];save();toast('復元しました')}catch(err){toast('復元に失敗しました')}};load();render();
